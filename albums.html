<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nic tu ciekawego, możesz wyjść bez obaw że coś cię ominie. A tak serio to strona o mnie.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.wegrzvnxwski.github.io/wegrzvnxwskis-site/albums">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Indie+Flower&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icon.png">
    <title>Albumy, które siadły – Kacprowa strona</title>
    <script src="layout.js" defer></script>
    <script defer>
        async function zaladujMuzyke() {
            const response = await fetch('albums.json');
            const albumy = await response.json();

            const sekcjaSpotify = document.getElementById('spotify-smietnik');
            const sekcjaUnderground = document.getElementById('underground-smietnik');

            const naSpotify = albumy.filter(album => album.czySpotify === true);
            const bezSpotify = albumy.filter(album => album.czySpotify === false);

            naSpotify.forEach(album => {
                sekcjaSpotify.innerHTML += `
                    <a href="${album.url}" target="_blank">
                        <img src="${album.okladka}" alt="${album.tytul}">
                    </a>
                `;
            });

            bezSpotify.forEach(album => {
                sekcjaUnderground.innerHTML += `
                    <a href="${album.url}" target="_blank" rel="noopener noreferrer">
                        <img src="${album.okladka}" alt="${album.tytul}">
                    </a>
                `;
            });
        }

        document.addEventListener('DOMContentLoaded', zaladujMuzyke);
    </script>
</head>

<body>
    <div class="wrapper alb">
        <header>
            <nav id="navbarek"></nav>
            <h1>Albumy, które mi siadły i które mocno z serduszka polecam</h1>
            <p class="adno">(okładki albumów prowadzą do Spotify)</p>
        </header>
        <main>
            <noscript>
                <h3 style="text-align: center;">Uh-oh! Nie masz włączonego JavaScriptu! No trudno, nie posłuchasz sobie muzyczki.</h3>
            </noscript>
            <section class="albums" id="spotify-smietnik"></section>
            <h2 style="text-align:center;font-family:'Indie Flower','Google Sans',monospace;">Albumy i wykonawcy, których nie ma na Spotify (a są cudowne):</h2>
            <noscript>
                <h3 style="text-align: center;">Włącz JSa, pls >_<</h3>
            </noscript>
            <section class="albums" id="underground-smietnik"></section>
            <section class="terminal">
                <code><b>wegrzvnxwski@wegrzvnxwski</b>:~$ whoami<span id="mrugaczek"></span></code>
            </section>
        </main>
        <footer id="stopka"></footer>
    </div>
</body>
</html>
